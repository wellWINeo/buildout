name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: ubuntu-latest
            rid: linux-arm64
          - runner: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - uses: actions/cache@v4
        with:
          path: |
            src/*/obj
            tests/*/obj
          key: ${{ matrix.rid }}-build-obj-${{ github.sha }}
          restore-keys: |
            ${{ matrix.rid }}-build-obj-
      - run: dotnet build --configuration Release

  test-unit:
    needs: build
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: ubuntu-latest
            rid: linux-arm64
          - runner: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: |
            src/*/obj
            tests/*/obj
          key: ${{ matrix.rid }}-build-obj-${{ github.sha }}
          restore-keys: |
            ${{ matrix.rid }}-build-obj-
      - run: dotnet test tests/Buildout.UnitTests --configuration Release

  test-integration:
    needs: [build, test-unit]
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: |
            src/*/obj
            tests/*/obj
          key: linux-x64-build-obj-${{ github.sha }}
          restore-keys: |
            linux-x64-build-obj-
      - run: dotnet test tests/Buildout.IntegrationTests --configuration Release

  publish-singlefile:
    needs: [build, test-unit]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: ubuntu-latest
            rid: linux-arm64
          - runner: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: |
            src/*/obj
            tests/*/obj
          key: ${{ matrix.rid }}-build-obj-${{ github.sha }}
          restore-keys: |
            ${{ matrix.rid }}-build-obj-
      - run: dotnet publish src/Buildout.Cli -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true --output publish/cli
      - run: dotnet publish src/Buildout.Mcp -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true --output publish/mcp
      - uses: actions/upload-artifact@v4
        with:
          name: buildout-cli-${{ matrix.rid }}
          path: publish/cli/
      - uses: actions/upload-artifact@v4
        with:
          name: buildout-mcp-${{ matrix.rid }}
          path: publish/mcp/

  publish-fdd:
    needs: [build, test-unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: |
            src/*/obj
            tests/*/obj
          key: linux-x64-build-obj-${{ github.sha }}
          restore-keys: |
            linux-x64-build-obj-
      - run: dotnet publish src/Buildout.Cli -c Release --output publish/cli
      - run: dotnet publish src/Buildout.Mcp -c Release --output publish/mcp
      - uses: actions/upload-artifact@v4
        with:
          name: buildout-cli-fdd
          path: publish/cli/
      - uses: actions/upload-artifact@v4
        with:
          name: buildout-mcp-fdd
          path: publish/mcp/