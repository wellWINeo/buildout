name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: ubuntu-latest
            rid: linux-arm64
          - runner: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - uses: actions/cache@v4
        with:
          path: |
            src/*/bin
            src/*/obj
          key: ${{ matrix.rid }}-build-${{ github.sha }}
      - run: dotnet build -c Release -r ${{ matrix.rid }}

  build-fdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - uses: actions/cache@v4
        with:
          path: |
            src/*/bin
            src/*/obj
            tests/*/bin
            tests/*/obj
          key: fdd-build-${{ github.sha }}
      - run: dotnet build -c Release

  test-unit:
    needs: build-fdd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: |
            src/*/bin
            src/*/obj
            tests/*/bin
            tests/*/obj
          key: fdd-build-${{ github.sha }}
          fail-on-cache-miss: true
      - run: dotnet test tests/Buildout.UnitTests -c Release --no-build

  test-integration:
    needs: test-unit
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: |
            src/*/bin
            src/*/obj
            tests/*/bin
            tests/*/obj
          key: fdd-build-${{ github.sha }}
          fail-on-cache-miss: true
      - run: dotnet test tests/Buildout.IntegrationTests -c Release --no-build

  publish-singlefile:
    needs: [build, test-integration]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: ubuntu-latest
            rid: linux-arm64
          - runner: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - uses: actions/cache@v4
        with:
          path: |
            src/*/bin
            src/*/obj
          key: ${{ matrix.rid }}-build-${{ github.sha }}
          fail-on-cache-miss: true
      - run: dotnet publish src/Buildout.Cli -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true --no-build --output publish/cli
      - run: dotnet publish src/Buildout.Mcp -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true --no-build --output publish/mcp
      - uses: actions/upload-artifact@v4
        with:
          name: buildout-cli-${{ matrix.rid }}
          path: publish/cli/
      - uses: actions/upload-artifact@v4
        with:
          name: buildout-mcp-${{ matrix.rid }}
          path: publish/mcp/

  publish-fdd:
    needs: test-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v4
        with:
          path: |
            src/*/bin
            src/*/obj
            tests/*/bin
            tests/*/obj
          key: fdd-build-${{ github.sha }}
          fail-on-cache-miss: true
      - run: dotnet publish src/Buildout.Cli -c Release --no-build --output publish/cli
      - run: dotnet publish src/Buildout.Mcp -c Release --no-build --output publish/mcp
      - uses: actions/upload-artifact@v4
        with:
          name: buildout-cli-fdd
          path: publish/cli/
      - uses: actions/upload-artifact@v4
        with:
          name: buildout-mcp-fdd
          path: publish/mcp/
